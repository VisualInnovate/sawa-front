name: Deploy Vue

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Dependencies and Build Vue
        run: |
          npm i
          npm run build

      - name: Clear old dist folder on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT || '22' }}
          script: |
            rm -rf /home/${{ secrets.USERNAME }}/public_html/repositories/sawa-front.test/dist
            mkdir -p /home/${{ secrets.USERNAME }}/public_html/repositories/sawa-front.test/dist
            echo "✅ تم مسح مجلد dist القديم وإعادة إنشائه بنجاح"

      - name: Upload new dist folder
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT || '22' }}
          source: "dist/*"
          target: "/home/${{ secrets.USERNAME }}/public_html/repositories/sawa-front.test"
          strip_components: 0
